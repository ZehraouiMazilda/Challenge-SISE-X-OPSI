@version: 3.25
@include "scl.conf"

options {
  chain_hostnames(off);
  flush_lines(0);
  use_dns(no);
  use_fqdn(no);
  owner("root");
  group("adm");
  perm(0640);
  stats_freq(0);
};

source s_src {
  system();
  internal();
  tcp(ip(0.0.0.0) port(514));
};

# Based on your provided file: key=value parsing (action=, SRC=, DPT=...)
parser p_fw_kv {
  kv_parser(
    prefix("fw.")
    pair-separator(" ")
    value-separator("=")
  );
};

filter f_firewall {
  match("action=PERMIT" value("MESSAGE")) or match("action=DENY" value("MESSAGE"));
};

rewrite r_normalize_action {
  subst("^PERMIT$", "Permit", value("fw.action"));
  subst("^DENY$", "Deny", value("fw.action"));
};

destination d_brut {
  file("/var/log/brut.log");
};

destination d_firewall {
  file(
    "/var/log/firewall/firewall.log"
    template("$YEAR-$MONTH-$DAY $HOUR:$MIN:$SEC;${fw.SRC};${fw.DST};${fw.PROTO};${fw.DPT};${fw.RULE};${fw.action};${fw.IN};${fw.OUT}\n")
  );
};

destination d_mysql {
  program(
    "mysql -h db -u opsie -popsie123 Logs_fw > /dev/null"
    template("INSERT INTO FW (datetime,ipsrc,ipdst,dstport,proto,action,policyid,interface_in,interface_out) VALUES ('$YEAR-$MONTH-$DAY $HOUR:$MIN:$SEC','${fw.SRC}','${fw.DST}','${fw.DPT}','${fw.PROTO}','${fw.action}','${fw.RULE}','${fw.IN}','${fw.OUT}');\n")
    template-escape(yes)
  );
};

destination d_logstash {
  tcp(
    "logstash"
    port(5044)
    template("{\"datetime\":\"$YEAR-$MONTH-$DAY $HOUR:$MIN:$SEC\",\"ipsrc\":\"${fw.SRC}\",\"ipdst\":\"${fw.DST}\",\"proto\":\"${fw.PROTO}\",\"dstport\":\"${fw.DPT}\",\"action\":\"${fw.action}\",\"policyid\":\"${fw.RULE}\",\"interface_in\":\"${fw.IN}\",\"interface_out\":\"${fw.OUT}\"}\n")
  );
};

log {
  source(s_src);
  parser(p_fw_kv);
  filter(f_firewall);
  rewrite(r_normalize_action);
  destination(d_brut);
  destination(d_firewall);
  destination(d_mysql);
  flags(flow-control);
};

log {
  source(s_src);
  parser(p_fw_kv);
  filter(f_firewall);
  rewrite(r_normalize_action);
  destination(d_logstash);
};

@include "/etc/syslog-ng/conf.d/*.conf"
